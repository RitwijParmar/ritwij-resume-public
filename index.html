<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ritwij Aryan Parmar</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --card: #fffdf8;
      --text: #1f2328;
      --muted: #5b615f;
      --line: #d8d1c4;
      --accent: #0b5fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: radial-gradient(circle at top, #fffdf8 0%, var(--bg) 62%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(31, 35, 40, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 16px;
      font-size: 1.08rem;
      line-height: 1.6;
      color: var(--muted);
    }

    ul {
      margin: 24px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 14px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .item {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Ritwij Aryan Parmar</h1>
    <p>Backend and AI systems engineer focused on inference, workflow systems, robotics-adjacent platforms, and production infrastructure.</p>
    <p>Use the links below to view the current resume and profile pages.</p>
    <ul>
      <li class="item"><a href="./ritwij_resume_manovarta.pdf">Full Resume</a></li>
      <li class="item"><a href="https://github.com/RitwijParmar">GitHub Profile</a></li>
      <li class="item"><a href="https://www.linkedin.com/in/ritwij-aryan-parmar-716024211/">LinkedIn Profile</a></li>
    </ul>
  </main>
</body>
</html>
